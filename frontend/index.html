<!doctype html>
<html lang="en" data-theme="day" data-perf="hi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>piCalendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,30..100;1,9..144,300..700,30..100&family=Geist:wght@300..600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="bg__layer bg__layer--day"></div>
    <div class="bg__layer bg__layer--night"></div>
    <div class="bg__grain"></div>
  </div>

  <main class="app" id="app">
    <!-- Header: date + current weather -->
    <header class="header glass" id="header">
      <div class="header__date">
        <span class="header__weekday" id="hdr-weekday">—</span>
        <span class="header__sep">·</span>
        <span class="header__month" id="hdr-month">—</span>
        <span class="header__day" id="hdr-day">—</span>
      </div>
      <div class="header__weather" id="hdr-weather">
        <span class="header__wicon" id="hdr-wicon"></span>
        <span class="header__wtemp" id="hdr-wtemp">—°</span>
        <span class="header__wdesc" id="hdr-wdesc">—</span>
        <span class="header__sep">·</span>
        <span class="header__loc" id="hdr-loc">—</span>
      </div>
    </header>

    <!-- 7-day weather pills -->
    <section class="forecast" id="forecast" aria-label="Weekly forecast"></section>

    <!-- Week grid -->
    <section class="week" id="week" aria-label="Week of events">
      <!-- Day headers -->
      <div class="week__dayheaders" id="dayheaders"></div>

      <!-- All-day strip -->
      <div class="week__allday" id="allday"></div>

      <!-- Time grid + columns -->
      <div class="week__grid" id="weekgrid">
        <div class="week__hours" id="hours"></div>
        <div class="week__cols" id="cols"></div>
        <div class="week__now" id="nowline" hidden></div>
      </div>
    </section>
  </main>

  <template id="tpl-forecast-pill">
    <div class="pill glass">
      <span class="pill__label"></span>
      <span class="pill__icon"></span>
      <span class="pill__hi"></span>
      <span class="pill__lo"></span>
    </div>
  </template>

  <template id="tpl-dayheader">
    <div class="dayhead">
      <div class="dayhead__label"></div>
      <div class="dayhead__num"></div>
    </div>
  </template>

  <template id="tpl-event">
    <article class="event glass" role="listitem">
      <div class="event__stripe"></div>
      <div class="event__body">
        <div class="event__title"></div>
        <div class="event__time"></div>
      </div>
    </article>
  </template>

  <template id="tpl-allday">
    <div class="alldaypill glass">
      <span class="alldaypill__stripe"></span>
      <span class="alldaypill__title"></span>
    </div>
  </template>

  <svg width="0" height="0" aria-hidden="true" style="position:absolute">
    <defs>
      <!-- Weather glyphs: sun, partly-cloud, cloud, rain, snow, fog, thunder -->
      <symbol id="w-sun" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round">
        <circle cx="12" cy="12" r="4.25" />
        <path d="M12 2.5v2M12 19.5v2M2.5 12h2M19.5 12h2M4.8 4.8l1.4 1.4M17.8 17.8l1.4 1.4M4.8 19.2l1.4-1.4M17.8 6.2l1.4-1.4" />
      </symbol>
      <symbol id="w-partly" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="8" cy="9" r="3.25" />
        <path d="M8 2.5v1.5M2.5 9H4M3.8 4.8l1 1M12.2 4.8l-1 1" />
        <path d="M9 17a4 4 0 0 1 4-4 4.5 4.5 0 0 1 4.4 3.6A3.2 3.2 0 0 1 17 22H9a2.5 2.5 0 0 1 0-5Z" />
      </symbol>
      <symbol id="w-cloud" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round">
        <path d="M6.5 19a4 4 0 0 1 .6-7.95A5.5 5.5 0 0 1 18 11a3.5 3.5 0 0 1-.5 8Z" />
      </symbol>
      <symbol id="w-rain" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6.5 15a4 4 0 0 1 .6-7.95A5.5 5.5 0 0 1 18 7a3.5 3.5 0 0 1-.5 8Z" />
        <path d="M9 19l-1 2.2M13 19l-1 2.2M17 19l-1 2.2" />
      </symbol>
      <symbol id="w-snow" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round">
        <path d="M6.5 15a4 4 0 0 1 .6-7.95A5.5 5.5 0 0 1 18 7a3.5 3.5 0 0 1-.5 8Z" />
        <path d="M9 19.5v2M9 20.5h-1M9 20.5h1M13 19.5v2M13 20.5h-1M13 20.5h1M17 19.5v2M17 20.5h-1M17 20.5h1" />
      </symbol>
      <symbol id="w-fog" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round">
        <path d="M4 9h16M3 13h18M5 17h14M7 21h10" />
      </symbol>
      <symbol id="w-thunder" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6.5 15a4 4 0 0 1 .6-7.95A5.5 5.5 0 0 1 18 7a3.5 3.5 0 0 1-.5 8Z" />
        <path d="M12 15l-2 4h3l-2 4" />
      </symbol>
    </defs>
  </svg>

  <script src="/app.js" defer></script>
</body>
</html>
